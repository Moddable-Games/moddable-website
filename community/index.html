<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>Community — Moddable.Games</title>
<link rel="stylesheet" href="../_mg.css">
<style>body{background:#f5f4ef}</style>
</head>
<body>
<div id="nav-root"></div>
<div id="page-hero"></div>

<section style="background:#f5f4ef;padding:72px 32px 96px">
  <div style="max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:56px">

    <!-- Stats -->
    <div>
      <div style="font-family:var(--mg-font-pixel);font-size:9px;color:#0c4f8d;letter-spacing:1.5px;margin-bottom:20px">▲ BY THE NUMBERS</div>
      <div id="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px"></div>
    </div>

    <!-- Discord channels -->
    <div>
      <div style="font-family:var(--mg-font-pixel);font-size:9px;color:#0c4f8d;letter-spacing:1.5px;margin-bottom:20px">▲ DISCORD CHANNELS</div>
      <h2 style="font-family:var(--mg-font-display);font-weight:600;font-size:clamp(32px,4vw,48px);line-height:1.05;letter-spacing:-0.025em;color:#14161c;margin:0 0 24px">Where the table talk happens.</h2>
      <div id="channels-list" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>

    <!-- Mod jams -->
    <div>
      <div style="font-family:var(--mg-font-pixel);font-size:9px;color:#3a9928;letter-spacing:1.5px;margin-bottom:20px">▲ MOD JAMS</div>
      <h2 style="font-family:var(--mg-font-display);font-weight:600;font-size:clamp(32px,4vw,48px);line-height:1.05;letter-spacing:-0.025em;color:#14161c;margin:0 0 24px">48 hours. One base game. Go.</h2>
      <div id="jams-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px"></div>
    </div>

    <!-- CTA -->
    <div style="background:#000;color:#fff;border-radius:20px;padding:48px 40px;text-align:center;position:relative;overflow:hidden">
      <div style="position:absolute;inset:0;background-image:url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'56\' height=\'64\' viewBox=\'0 0 56 64\'><path d=\'M28 1 54 16v32L28 63 2 48V16z\' fill=\'none\' stroke=\'%233a7be8\' stroke-opacity=\'0.18\' stroke-width=\'1\'/></svg>');background-size:56px 64px;animation:hexFloat 30s linear infinite;opacity:0.5"></div>
      <div style="position:relative">
        <div style="font-family:var(--mg-font-pixel);font-size:9px;color:#6fb5ff;letter-spacing:1.5px;margin-bottom:16px">▲ JOIN UP</div>
        <h3 style="font-family:var(--mg-font-display);font-weight:600;font-size:clamp(32px,4vw,48px);line-height:1.05;letter-spacing:-0.025em;margin:0 0 16px">Pull up a chair.</h3>
        <p style="font-family:var(--mg-font-body);font-size:17px;line-height:1.6;color:rgba(255,255,255,0.78);max-width:500px;margin:0 auto 28px">2,400 moddable minds. Free to join. Bring your own dice.</p>
        <div id="cta-btns" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap"></div>
      </div>
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../_mg.js"></script>
<script>
const { el, btn, linkBtn, navbar, footer, pageHero } = MG;
document.getElementById('nav-root').appendChild(navbar('About'));
document.getElementById('footer-root').appendChild(footer());
document.getElementById('page-hero').appendChild(pageHero({
  eyebrow:'▲ COMMUNITY',
  title:'2,400 moddables<br>and counting.',
  lede:'The Discord, the mod jams, the never-ending argument about whether Catan needs the Seafarers expansion.',
  withHorizon:true,
}));

// Stats
const STATS = [['2,400+','Discord members'],['12','published mods'],['3','mod jams run'],['6','team humans']];
const sg = document.getElementById('stats-grid');
STATS.forEach(([n,l]) => {
  const c = el('div',{style:{background:'#fff',border:'1px solid #e6e3d8',borderRadius:'16px',padding:'24px',textAlign:'center'}});
  c.appendChild(el('div',{style:{fontFamily:'var(--mg-font-display)',fontWeight:600,fontSize:'56px',lineHeight:'1',color:'#14161c',letterSpacing:'-1px'}},n));
  c.appendChild(el('div',{style:{fontFamily:'var(--mg-font-mono)',fontSize:'12px',color:'#7a8290',textTransform:'uppercase',letterSpacing:'0.8px',marginTop:'8px'}},l));
  sg.appendChild(c);
});

// Channels
const CHANNELS = [
  { name:'general',       desc:'The main table. Everything welcome.', members:342, accent:'#3a9928' },
  { name:'mod-pitches',   desc:'Share a mod idea. Get feedback.',       members:88,  accent:'#0c4f8d' },
  { name:'rules-debates', desc:'Rules arguments. Refereed by Tess.',    members:57,  accent:'#d11a1a' },
  { name:'playtesting',   desc:'Looking for testers, finding testers.', members:44,  accent:'#e89a1a' },
  { name:'nuke-catan',    desc:"It's its own channel. It needs it.",    members:210, accent:'#d11a1a' },
];
const cl = document.getElementById('channels-list');
CHANNELS.forEach(ch => {
  const a = el('a',{href:'#',style:{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:'16px',alignItems:'center',padding:'18px 20px',background:'#fff',border:'1px solid #e6e3d8',borderRadius:'12px',textDecoration:'none',color:'inherit',transition:'border-color 150ms'}});
  a.addEventListener('mouseenter',()=>a.style.borderColor='#14161c');
  a.addEventListener('mouseleave',()=>a.style.borderColor='#e6e3d8');
  a.appendChild(el('div',{style:{width:'8px',height:'32px',background:ch.accent,borderRadius:'4px'}}));
  const txt = el('div');
  txt.appendChild(el('div',{style:{fontFamily:'var(--mg-font-mono)',fontWeight:600,fontSize:'15px',color:'#14161c'}},`#${ch.name}`));
  txt.appendChild(el('div',{style:{fontFamily:'var(--mg-font-body)',fontSize:'13px',color:'#4f5764',marginTop:'2px'}},ch.desc));
  a.appendChild(txt);
  a.appendChild(el('div',{style:{fontFamily:'var(--mg-font-mono)',fontSize:'12px',color:'#7a8290',textAlign:'right'}},`${ch.members} online`));
  cl.appendChild(a);
});

// Jams
const JAMS = [
  { n:'#1', title:'Carcassonne',  date:'Oct 2025', entries:8,  winner:'Infinite Meeple (by @hexbear)', color:'#3a9928' },
  { n:'#2', title:'Risk',         date:'Jan 2026',  entries:22, winner:'Geo-political Risk (by @tessellate)', color:'#0c4f8d' },
  { n:'#3', title:'Catan',        date:'Apr 2026',  entries:12, winner:'Nuke Catan v0.9 (by @ascelot)', color:'#d11a1a' },
];
const jg = document.getElementById('jams-grid');
JAMS.forEach(j => {
  const c = el('div',{style:{background:'#fff',border:'1px solid #e6e3d8',borderRadius:'16px',padding:'24px',display:'flex',flexDirection:'column',gap:'12px'}});
  c.appendChild(el('div',{style:{fontFamily:'var(--mg-font-pixel)',fontSize:'9px',color:j.color,letterSpacing:'1.5px'}},`▲ JAM ${j.n}`));
  c.appendChild(el('h3',{style:{fontFamily:'var(--mg-font-display)',fontWeight:600,fontSize:'24px',lineHeight:'1.2',letterSpacing:'-0.25px',color:'#14161c',margin:0}},j.title));
  const meta = el('div',{style:{fontFamily:'var(--mg-font-mono)',fontSize:'12px',color:'#7a8290'}});
  meta.textContent = `${j.date} · ${j.entries} entries`;
  c.appendChild(meta);
  const winner = el('div',{style:{background:'#f5f4ef',borderRadius:'10px',padding:'12px',fontFamily:'var(--mg-font-body)',fontSize:'13px',color:'#1f2228',lineHeight:'1.45'}});
  winner.innerHTML = `<span style="font-weight:600;color:${j.color}">Winner:</span> ${j.winner}`;
  c.appendChild(winner);
  jg.appendChild(c);
});

// CTA buttons
const cb = document.getElementById('cta-btns');
cb.appendChild(linkBtn('Open the Discord','#','primary'));
cb.appendChild(linkBtn('Submit a mod','/submit/','outline-dark'));
</script>
</body>
</html>
