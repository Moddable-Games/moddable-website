<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>Community — Moddable.Games</title>
<link rel="stylesheet" href="../css/_mg.css">
<style>
body { background: #f5f4ef; }
.community-section { padding: 72px 32px 96px; }
.community-section__inner { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 56px; }
.stat-card { background: #fff; border: 1px solid var(--mg-hairline-light); border-radius: 16px; padding: 24px; text-align: center; }
.stat-card__number { font-family: var(--mg-font-display); font-weight: 600; font-size: 56px; line-height: 1; color: var(--mg-ink); letter-spacing: -1px; }
.stat-card__label { font-family: var(--mg-font-mono); font-size: 12px; color: var(--mg-stone); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 8px; }
.channel-link { display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; padding: 18px 20px; background: #fff; border: 1px solid var(--mg-hairline-light); border-radius: 12px; text-decoration: none; color: inherit; transition: border-color 150ms; }
.channel-link:hover { border-color: var(--mg-ink); }
.channel-link__bar { width: 8px; height: 32px; border-radius: 4px; }
.channel-link__name { font-family: var(--mg-font-mono); font-weight: 600; font-size: 15px; color: var(--mg-ink); }
.channel-link__desc { font-family: var(--mg-font-body); font-size: 13px; color: var(--mg-mute); margin-top: 2px; }
.channel-link__count { font-family: var(--mg-font-mono); font-size: 12px; color: var(--mg-stone); text-align: right; }
.jam-card { background: #fff; border: 1px solid var(--mg-hairline-light); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.jam-card__title { font-family: var(--mg-font-display); font-weight: 600; font-size: 24px; line-height: 1.2; letter-spacing: -0.25px; color: var(--mg-ink); margin: 0; }
.jam-card__meta { font-family: var(--mg-font-mono); font-size: 12px; color: var(--mg-stone); }
.jam-card__winner { background: var(--mg-canvas-light); border-radius: 10px; padding: 12px; font-family: var(--mg-font-body); font-size: 13px; color: var(--mg-body-color); line-height: 1.45; }
.community-cta { background: #000; color: #fff; border-radius: 20px; padding: 48px 40px; text-align: center; position: relative; overflow: hidden; }
.community-cta__hex { position: absolute; inset: 0; background-image: url('../img/hex-grid-blue.svg'); background-size: 56px 64px; animation: hexFloat 30s linear infinite; opacity: 0.5; }
.jam-card__winner-label { font-weight: 600; }
.community-cta__inner { position: relative; }
.community-cta__heading { font-family: var(--mg-font-display); font-weight: 600; font-size: clamp(32px, 4vw, 48px); line-height: 1.05; letter-spacing: -0.025em; margin: 0 0 16px; }
.community-cta__body { font-family: var(--mg-font-body); font-size: 17px; line-height: 1.6; color: rgba(255,255,255,0.78); max-width: 500px; margin: 0 auto 28px; }
.community-cta__btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="nav-root"></div>
<div id="page-hero"></div>

<section class="community-section">
  <div class="community-section__inner">

    <div>
      <div class="mg-eyebrow mg-eyebrow--blue">BY THE NUMBERS</div>
      <div id="stats-grid" class="mg-grid-auto"></div>
    </div>

    <div>
      <div class="mg-eyebrow mg-eyebrow--blue">DISCORD CHANNELS</div>
      <h2 class="mg-heading-lg">Where the table talk happens.</h2>
      <div id="channels-list" class="rules-list"></div>
    </div>

    <div>
      <div class="mg-eyebrow mg-eyebrow--green">MOD JAMS</div>
      <h2 class="mg-heading-lg">48 hours. One base game. Go.</h2>
      <div id="jams-grid" class="mg-grid-auto"></div>
    </div>

    <div class="community-cta">
      <div class="community-cta__hex" id="cta-hex"></div>
      <div class="community-cta__inner">
        <div class="mg-eyebrow mg-eyebrow--glow">JOIN UP</div>
        <h3 class="community-cta__heading">Pull up a chair.</h3>
        <p class="community-cta__body">2,400 moddable minds. Free to join. Bring your own dice.</p>
        <div class="community-cta__btns" id="cta-btns"></div>
      </div>
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../js/_mg.js"></script>
<script>
const { el, btn, linkBtn, navbar, footer, pageHero } = MG;
document.getElementById('nav-root').appendChild(navbar('About'));
document.getElementById('footer-root').appendChild(footer());
document.getElementById('page-hero').appendChild(pageHero({
  eyebrow:'COMMUNITY',
  title:'2,400 moddables<br>and counting.',
  lede:'The Discord, the mod jams, the never-ending argument about whether Catan needs the Seafarers expansion.',
  withHorizon:true,
}));

// Stats
const STATS = [['2,400+','Discord members'],['12','published mods'],['3','mod jams run'],['6','team humans']];
const sg = document.getElementById('stats-grid');
STATS.forEach(([n,l]) => {
  const c = el('div',{class:'stat-card'});
  c.appendChild(el('div',{class:'stat-card__number'},n));
  c.appendChild(el('div',{class:'stat-card__label'},l));
  sg.appendChild(c);
});

// Channels
const CHANNELS = [
  { name:'general',       desc:'The main table. Everything welcome.', members:342, accent:'#3a9928' },
  { name:'mod-pitches',   desc:'Share a mod idea. Get feedback.',       members:88,  accent:'#0c4f8d' },
  { name:'rules-debates', desc:'Rules arguments. Refereed by Tess.',    members:57,  accent:'#d11a1a' },
  { name:'playtesting',   desc:'Looking for testers, finding testers.', members:44,  accent:'#e89a1a' },
  { name:'nuke-catan',    desc:"It's its own channel. It needs it.",    members:210, accent:'#d11a1a' },
];
const cl = document.getElementById('channels-list');
CHANNELS.forEach(ch => {
  const a = el('a',{href:'#',class:'channel-link'});
  const bar = el('div',{class:'channel-link__bar'});
  bar.style.background = ch.accent;
  a.appendChild(bar);
  const txt = el('div');
  txt.appendChild(el('div',{class:'channel-link__name'},`#${ch.name}`));
  txt.appendChild(el('div',{class:'channel-link__desc'},ch.desc));
  a.appendChild(txt);
  a.appendChild(el('div',{class:'channel-link__count'},`${ch.members} online`));
  cl.appendChild(a);
});

// Jams
const JAMS = [
  { n:'#1', title:'Carcassonne',  date:'Oct 2025', entries:8,  winner:'Infinite Meeple (by @hexbear)', color:'#3a9928' },
  { n:'#2', title:'Risk',         date:'Jan 2026',  entries:22, winner:'Geo-political Risk (by @tessellate)', color:'#0c4f8d' },
  { n:'#3', title:'Catan',        date:'Apr 2026',  entries:12, winner:'Nuke Catan v0.9 (by @ascelot)', color:'#d11a1a' },
];
const jg = document.getElementById('jams-grid');
JAMS.forEach(j => {
  const c = el('div',{class:'jam-card'});
  const eye = el('div',{class:'mg-card__eyebrow'});
  eye.style.color = j.color;
  eye.textContent = `JAM ${j.n}`;
  c.appendChild(eye);
  c.appendChild(el('h3',{class:'jam-card__title'},j.title));
  const meta = el('div',{class:'jam-card__meta'});
  meta.textContent = `${j.date} · ${j.entries} entries`;
  c.appendChild(meta);
  const winner = el('div',{class:'jam-card__winner'});
  const winLabel = document.createElement('span');
  winLabel.className = 'jam-card__winner-label';
  winLabel.style.color = j.color;
  winLabel.textContent = 'Winner:';
  winner.appendChild(winLabel);
  winner.appendChild(document.createTextNode(' ' + j.winner));
  c.appendChild(winner);
  jg.appendChild(c);
});

// CTA
const cb = document.getElementById('cta-btns');
cb.appendChild(linkBtn('Open the Discord','#','primary'));
cb.appendChild(linkBtn('Submit a mod','/submit/','outline-dark'));
</script>
</body>
</html>
