<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moddable.Games — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #1a1a1a; font-family: system-ui, sans-serif; }
#preview-shell { display: flex; flex-direction: column; height: 100vh; }
#preview-bar { flex: none; height: 44px; background: #111; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; }
#preview-bar-brand { display: flex; align-items: center; gap: 8px; padding: 0 14px; border-right: 1px solid #2a2a2a; height: 100%; flex: none; }
#preview-bar-brand span { font-size: 11px; font-weight: 600; color: #666; letter-spacing: 0.5px; text-transform: uppercase; }
#preview-bar-pages { display: flex; align-items: center; overflow-x: auto; flex: 1; scrollbar-width: none; padding: 0 6px; gap: 1px; }
#preview-bar-pages::-webkit-scrollbar { display: none; }
.pbtn { flex: none; height: 28px; padding: 0 10px; border-radius: 5px; border: none; background: transparent; color: #555; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 100ms; }
.pbtn:hover { background: #222; color: #bbb; }
.pbtn.active { background: #2a2a2a; color: #fff; }
#preview-bar-back { flex: none; height: 28px; padding: 0 12px; margin-right: 8px; border-radius: 5px; border: 1px solid #333; background: transparent; color: #666; font-size: 12px; cursor: pointer; white-space: nowrap; display: none; }
#preview-bar-back:hover { color: #fff; border-color: #555; }
#preview-viewport { flex: 1; overflow: hidden; }
#preview-frame { width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden; background: #000; }
#page-style {}
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;600&display=swap");

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
em { font-style: italic; }
img { display: block; max-width: 100%; }

button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
  outline: 2px solid #6fb5ff;
  outline-offset: 3px;
  border-radius: 4px;
}

:root {
  --mg-red: #d11a1a;
  --mg-red-bright: #e63232;
  --mg-green: #3a9928;
  --mg-blue: #0c4f8d;
  --mg-blue-bright: #1a6dc4;
  --mg-cosmic-deep: #0a0d2a;
  --mg-cosmic-mid: #1a3680;
  --mg-cosmic-bright: #3a7be8;
  --mg-cosmic-glow: #6fb5ff;
  --mg-canvas-light: #f5f4ef;
  --mg-surface-elevated: #161721;
  --mg-hairline-light: #e6e3d8;
  --mg-ink: #14161c;
  --mg-body-color: #1f2228;
  --mg-mute: #4f5764;
  --mg-stone: #7a8290;
  --mg-faint: #c3c5cc;
  --mg-font-display: "Inter Tight", system-ui, sans-serif;
  --mg-font-body: "Inter", system-ui, sans-serif;
  --mg-font-mono: "JetBrains Mono", monospace;
  --mg-font-pixel: "Press Start 2P", monospace;
}

@keyframes hexFloat {
  from { background-position: 0 0; }
  to   { background-position: 56px 64px; }
}
@keyframes fadeRise {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Prose styles for article pages */
.prose { font-family: var(--mg-font-body); font-size: 19px; line-height: 1.65; color: var(--mg-body-color); }
.prose p { margin: 0 0 24px; }
.prose p.lede { font-size: 23px; line-height: 1.5; color: var(--mg-ink); font-style: italic; }
.prose h2 { font-family: var(--mg-font-display); font-weight: 600; font-size: 32px; line-height: 1.15; letter-spacing: -0.4px; margin: 40px 0 16px; color: var(--mg-ink); }
.prose blockquote { margin: 32px 0; padding: 20px 24px; border-left: 4px solid var(--mg-red); background: #fff; font-style: italic; color: var(--mg-ink); font-size: 20px; line-height: 1.5; }
.prose ul { padding-left: 22px; margin: 0 0 24px; }
.prose li { margin: 0 0 8px; }

/* Responsive helpers */
@media (max-width: 768px) {
  .hide-mobile { display: none !important; }
  .mg-grid-3 { grid-template-columns: 1fr !important; }
  .mg-grid-2 { grid-template-columns: 1fr !important; }
  .mg-grid-4 { grid-template-columns: 1fr 1fr !important; }
}
@media (max-width: 540px) {
  .mg-grid-4 { grid-template-columns: 1fr !important; }
  section, .section-pad { padding-left: 20px !important; padding-right: 20px !important; }
}

</style>
</head>
<body>
<div id="preview-shell">
  <div id="preview-bar">
    <div id="preview-bar-brand"><div id="brand-cube"></div><span>Preview</span></div>
    <div id="preview-bar-pages"></div>
    <button id="preview-bar-back">↑ Back</button>
  </div>
  <div id="preview-viewport">
    <div id="preview-frame">
      <div id="nav-root"></div>
      <div id="page-root"></div>
      <div id="footer-root"></div>
    </div>
  </div>
</div>
<script>/* =========================================================================
   Moddable.Games — Shared Component Library
   Vanilla JS, zero dependencies. All components write DOM directly.
   ========================================================================= */

const MG = (() => {

  /* ── Tokens ──────────────────────────────────────────────────────────── */
  const T = {
    red:"#d11a1a", redBright:"#e63232", redDeep:"#a31212",
    green:"#3a9928", greenBright:"#4eb735",
    blue:"#0c4f8d", blueBright:"#1a6dc4", blueDeep:"#07335c",
    cosmicDeep:"#0a0d2a", cosmicMid:"#1a3680", cosmicBright:"#3a7be8",
    cosmicGlow:"#6fb5ff",
    canvasLight:"#f5f4ef", canvasDark:"#000000",
    surfaceElevated:"#161721",
    hairlineLight:"#e6e3d8",
    ink:"#14161c", body:"#1f2228", charcoal:"#3a3d44",
    mute:"#4f5764", stone:"#7a8290", faint:"#c3c5cc",
  };

  const CATEGORY_COLORS = {
    "Total conversion": T.red,
    "Rebalance": T.green,
    "Reskin": T.blue,
  };

  const HEX_BG = `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='64' viewBox='0 0 56 64'><path d='M28 1 54 16v32L28 63 2 48V16z' fill='none' stroke='%233a7be8' stroke-opacity='0.18' stroke-width='1'/></svg>")`;

  const F = {
    display: `"Inter Tight", system-ui, sans-serif`,
    body: `"Inter", system-ui, sans-serif`,
    mono: `"JetBrains Mono", monospace`,
    pixel: `"Press Start 2P", monospace`,
  };

  /* ── Helpers ─────────────────────────────────────────────────────────── */
  function el(tag, attrs, ...children) {
    const e = document.createElement(tag);
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'style' && typeof v === 'object') {
          Object.assign(e.style, v);
        } else if (k === 'html') {
          e.innerHTML = v;
        } else if (k.startsWith('on')) {
          e.addEventListener(k.slice(2).toLowerCase(), v);
        } else {
          e.setAttribute(k, v);
        }
      }
    }
    for (const c of children) {
      if (c == null) continue;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return e;
  }

  function css(obj) { return obj; } // passthrough — used for readability

  /* ── Cube SVG ─────────────────────────────────────────────────────────── */
  function cubeSVG(size = 32) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', Math.round(size * 1.1));
    svg.setAttribute('viewBox', '0 0 100 110');
    svg.setAttribute('aria-hidden', 'true');
    const polys = [
      ['50,5 92,30 50,55 8,30', T.red],
      ['8,30 50,55 50,105 8,80', T.green],
      ['92,30 50,55 50,105 92,80', T.blue],
    ];
    for (const [pts, fill] of polys) {
      const p = document.createElementNS(ns, 'polygon');
      p.setAttribute('points', pts);
      p.setAttribute('fill', fill);
      p.setAttribute('stroke', '#000');
      p.setAttribute('stroke-width', '2.5');
      svg.appendChild(p);
    }
    return svg;
  }

  /* ── Btn ─────────────────────────────────────────────────────────────── */
  const BTN_VARIANTS = {
    primary:      { bg:'#fff', fg:'#000', border:'none' },
    dark:         { bg:'#14161c', fg:'#fff', border:'none' },
    blue:         { bg:T.blue, fg:'#fff', border:'none' },
    green:        { bg:T.green, fg:'#fff', border:'none' },
    red:          { bg:T.red, fg:'#fff', border:'none' },
    'outline-dark': { bg:'transparent', fg:'#fff', border:'1px solid rgba(255,255,255,0.35)' },
    'outline-light':{ bg:'transparent', fg:T.ink, border:`1px solid ${T.hairlineLight}` },
  };
  const BTN_HOVER = {
    primary:'#e8e8e8', dark:'#2a2d36', blue:T.blueBright,
    green:T.greenBright, red:T.redBright,
    'outline-dark':'rgba(255,255,255,0.1)', 'outline-light':'rgba(0,0,0,0.04)',
  };

  function btn(label, variant = 'primary', onClick, extraStyle = {}) {
    const v = BTN_VARIANTS[variant] || BTN_VARIANTS.primary;
    const b = el('button', {
      style: css({
        display:'inline-flex', alignItems:'center', justifyContent:'center',
        height:'48px', padding:'0 22px', borderRadius:'9999px',
        border: v.border || 'none',
        background: v.bg, color: v.fg,
        fontFamily: F.body, fontWeight:600, fontSize:'15px',
        letterSpacing:'0.2px', cursor:'pointer',
        textDecoration:'none', whiteSpace:'nowrap',
        transition:'background 180ms cubic-bezier(.2,.8,.2,1), transform 180ms',
        ...extraStyle,
      }),
    });
    b.innerHTML = label;
    b.addEventListener('mouseenter', () => b.style.background = BTN_HOVER[variant] || v.bg);
    b.addEventListener('mouseleave', () => b.style.background = v.bg);
    if (onClick) b.addEventListener('click', onClick);
    return b;
  }

  function linkBtn(label, href, variant = 'primary', extraStyle = {}) {
    const v = BTN_VARIANTS[variant] || BTN_VARIANTS.primary;
    const a = el('a', {
      href,
      style: css({
        display:'inline-flex', alignItems:'center', justifyContent:'center',
        height:'48px', padding:'0 22px', borderRadius:'9999px',
        border: v.border || 'none',
        background: v.bg, color: v.fg,
        fontFamily: F.body, fontWeight:600, fontSize:'15px',
        letterSpacing:'0.2px', cursor:'pointer',
        textDecoration:'none', whiteSpace:'nowrap',
        transition:'background 180ms cubic-bezier(.2,.8,.2,1)',
        ...extraStyle,
      }),
    });
    a.innerHTML = label;
    a.addEventListener('mouseenter', () => a.style.background = BTN_HOVER[variant] || v.bg);
    a.addEventListener('mouseleave', () => a.style.background = v.bg);
    return a;
  }

  /* ── NavBar ──────────────────────────────────────────────────────────── */
  function navbar(activeId) {
    const NAV_ITEMS = [
      { id:'Mods', href:'mods.html' },
      { id:'Games', href:'game-detail.html' },
      { id:'Tools', href:'tools.html' },
      { id:'News', href:'news.html' },
      { id:'About', href:'about.html' },
    ];

    const header = el('header', { style: css({
      height:'64px', background:'#000', position:'sticky', top:0, zIndex:50,
      borderBottom:'1px solid rgba(255,255,255,0.08)',
      display:'flex', alignItems:'center', padding:'0 24px', gap:'24px',
      boxSizing:'border-box',
    })});

    // Logo
    const logoWrap = el('a', { href:'index.html', style:{ display:'flex', alignItems:'center', gap:'10px', textDecoration:'none' }});
    logoWrap.appendChild(cubeSVG(28));
    logoWrap.appendChild(el('span', { style:{ fontFamily:F.display, fontWeight:700, fontSize:'17px', color:'#fff', letterSpacing:'-0.3px' }}, 'Moddable.Games'));
    header.appendChild(logoWrap);

    // Desktop nav
    const nav = el('nav', { style:{ display:'flex', gap:'24px', marginLeft:'12px' }});
    for (const item of NAV_ITEMS) {
      const isActive = activeId === item.id;
      const a = el('a', {
        href: item.href,
        style: css({
          fontFamily:F.body, fontWeight:500, fontSize:'14px',
          color: isActive ? '#fff' : 'rgba(255,255,255,0.6)',
          textDecoration:'none', letterSpacing:'0.2px',
          position:'relative', paddingBottom:'4px',
        }),
      }, item.id);
      if (isActive) {
        a.appendChild(el('span', { style:{ position:'absolute', bottom:'-22px', left:0, right:0, height:'2px', background:T.cosmicGlow }}));
      }
      nav.appendChild(a);
    }
    header.appendChild(nav);

    // Right side
    const right = el('div', { style:{ marginLeft:'auto', display:'flex', gap:'12px', alignItems:'center' }});
    const discordLink = el('a', { href:'community.html', style:{ fontFamily:F.pixel, fontSize:'8px', color:T.cosmicGlow, letterSpacing:'1.5px', textDecoration:'none' }}, '▲ DISCORD');
    right.appendChild(discordLink);
    right.appendChild(linkBtn('Mod a game', 'submit.html', 'primary', { height:'38px', fontSize:'13px', padding:'0 16px' }));
    header.appendChild(right);

    // Mobile hamburger (CSS media query shows/hides)
    const style = el('style');
    style.textContent = `
      @media (max-width:900px) {
        #mg-nav-desktop { display:none !important; }
        #mg-nav-right-full { display:none !important; }
        #mg-hamburger { display:flex !important; }
      }
      @media (min-width:901px) {
        #mg-mobile-drawer { display:none !important; }
      }
    `;
    document.head.appendChild(style);
    nav.id = 'mg-nav-desktop';
    right.id = 'mg-nav-right-full';

    const hamburger = el('button', {
      id:'mg-hamburger',
      'aria-label':'Menu',
      style: css({ display:'none', marginLeft:'auto', width:'40px', height:'40px', background:'transparent', color:'#fff', border:'1px solid rgba(255,255,255,0.2)', borderRadius:'9999px', cursor:'pointer', alignItems:'center', justifyContent:'center', fontSize:'18px' }),
    }, '☰');
    header.appendChild(hamburger);

    const drawer = el('div', {
      id:'mg-mobile-drawer',
      style: css({ position:'fixed', top:'64px', left:0, right:0, bottom:0, background:'#000', zIndex:49, padding:'32px 24px', overflowY:'auto' }),
    });
    const drawerNav = el('nav', { style:{ display:'flex', flexDirection:'column', gap:'4px' }});
    for (const item of NAV_ITEMS) {
      drawerNav.appendChild(el('a', { href:item.href, style:{ fontFamily:F.body, fontWeight:600, fontSize:'20px', color: activeId===item.id?'#fff':'rgba(255,255,255,0.65)', textDecoration:'none', padding:'12px 0', display:'block' }}, item.id));
    }
    drawer.appendChild(drawerNav);

    let drawerOpen = false;
    hamburger.addEventListener('click', () => {
      drawerOpen = !drawerOpen;
      drawer.style.display = drawerOpen ? 'block' : 'none';
      hamburger.textContent = drawerOpen ? '✕' : '☰';
    });

    return el('div', { style:{ position:'sticky', top:0, zIndex:50 }}, header, drawer);
  }

  /* ── Footer ──────────────────────────────────────────────────────────── */
  function footer() {
    const COLS = [
      { title:'Mods',      links:[['All mods','mods.html'],['Submit a mod','submit.html']] },
      { title:'Games',     links:[['Endless Skies','game-detail.html'],['Mongo','game-mongo.html'],['Nukes','game-nukes.html']] },
      { title:'Tools',     links:[['Workbench','tools.html']] },
      { title:'Community', links:[['Discord','community.html'],['News','news.html'],['About','about.html'],['Team','team.html']] },
    ];

    const f = el('footer', { style:{ background:'#000', color:'#fff', padding:'80px 24px 40px', boxSizing:'border-box' }});
    const inner = el('div', { style:{ maxWidth:'1200px', margin:'0 auto' }});

    const grid = el('div', { style:{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))', gap:'32px', paddingBottom:'56px', borderBottom:'1px solid rgba(255,255,255,0.12)' }});

    // Brand column
    const brand = el('div');
    const logoWrap = el('div', { style:{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'18px' }});
    logoWrap.appendChild(cubeSVG(28));
    logoWrap.appendChild(el('span', { style:{ fontFamily:F.display, fontWeight:700, fontSize:'16px', color:'#fff', letterSpacing:'-0.3px' }}, 'Moddable.Games'));
    brand.appendChild(logoWrap);
    brand.appendChild(el('p', { style:{ fontFamily:F.body, fontSize:'14px', lineHeight:'1.6', color:'rgba(255,255,255,0.65)', maxWidth:'280px', margin:0 }}, 'Creating games you already own. Twelve mods. Three originals. One Discord.'));
    grid.appendChild(brand);

    for (const col of COLS) {
      const c = el('div');
      c.appendChild(el('h4', { style:{ fontFamily:F.body, fontWeight:600, fontSize:'12px', color:'#fff', letterSpacing:'0.8px', textTransform:'uppercase', margin:'0 0 18px' }}, col.title));
      const ul = el('ul', { style:{ listStyle:'none', padding:0, margin:0, display:'flex', flexDirection:'column', gap:'10px' }});
      for (const [text, href] of col.links) {
        ul.appendChild(el('li', {}, el('a', { href, style:{ fontFamily:F.body, fontSize:'14px', color:'rgba(255,255,255,0.65)', textDecoration:'none' }}, text)));
      }
      c.appendChild(ul);
      grid.appendChild(c);
    }
    inner.appendChild(grid);

    const bottom = el('div', { style:{ paddingTop:'40px', display:'flex', flexWrap:'wrap', gap:'16px', justifyContent:'space-between', fontFamily:F.mono, fontSize:'12px', color:'rgba(255,255,255,0.45)', lineHeight:'1.6' }});
    bottom.appendChild(el('span', {}, '© 2026 Moddable.Games'));
    bottom.appendChild(el('span', { style:{ maxWidth:'700px', textAlign:'right' }}, 'Fan-made. Not affiliated with Hasbro, Asmodee, Fantasy Flight, or any rights-holder of the games we mod. All trademarks belong to their respective owners.'));
    inner.appendChild(bottom);
    f.appendChild(inner);
    return f;
  }

  /* ── ModCard ─────────────────────────────────────────────────────────── */
  function modCard({ category, title, baseGame, stats, body, href = '#', source = '' }) {
    const accent = CATEGORY_COLORS[category] || T.blue;
    const card = el('article', { style: css({
      background:'#fff', borderRadius:'20px', overflow:'hidden',
      border:`1px solid ${T.hairlineLight}`,
      display:'flex', flexDirection:'column',
      transition:'border-color 180ms cubic-bezier(.2,.8,.2,1), transform 180ms',
      cursor:'pointer',
    })});

    card.addEventListener('mouseenter', () => { card.style.borderColor = accent; card.style.transform = 'translateY(-3px)'; });
    card.addEventListener('mouseleave', () => { card.style.borderColor = T.hairlineLight; card.style.transform = 'translateY(0)'; });

    // Top stripe
    card.appendChild(el('div', { style:{ height:'4px', background:accent }}));

    const inner = el('div', { style:{ padding:'20px', display:'flex', flexDirection:'column', gap:'14px', flex:1 }});

    // Thumb
    const thumb = el('div', { style:{ width:'100%', aspectRatio:'1.6', borderRadius:'12px', overflow:'hidden', position:'relative', background:`linear-gradient(135deg, #0a0d2a 0%, ${accent} 100%)` }});
    const hexPat = el('div', { style:{ position:'absolute', inset:0, backgroundImage:`url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='28' height='32' viewBox='0 0 56 64'><path d='M28 1 54 16v32L28 63 2 48V16z' fill='none' stroke='%23fff' stroke-opacity='0.25' stroke-width='1'/></svg>")`, backgroundSize:'28px 32px' }});
    thumb.appendChild(hexPat);
    inner.appendChild(thumb);

    // Meta row
    const meta = el('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px' }});
    meta.appendChild(el('span', { style:{ fontFamily:F.body, fontWeight:600, fontSize:'11px', background:accent, color:'#fff', padding:'4px 10px', borderRadius:'9999px', letterSpacing:'0.2px' }}, category));
    meta.appendChild(el('span', { style:{ fontFamily:F.mono, fontSize:'11px', color:T.stone }}, baseGame));
    inner.appendChild(meta);

    // Title
    inner.appendChild(el('h3', { html: title, style:{ fontFamily:F.display, fontWeight:600, fontSize:'22px', lineHeight:'1.2', letterSpacing:'-0.25px', color:T.ink, margin:0 }}));

    // Body
    inner.appendChild(el('p', { style:{ fontFamily:F.body, fontSize:'14px', lineHeight:'1.55', color:T.mute, margin:0, flex:1 }}, body));

    // Stats + source
    const statsRow = el('div',{style:{fontFamily:F.mono, fontSize:'12px', color:T.mute, paddingTop:'12px', borderTop:`1px solid ${T.hairlineLight}`, display:'flex', flexDirection:'column', gap:'4px'}});
    statsRow.appendChild(document.createTextNode(stats));
    if (source) {
      statsRow.appendChild(el('span',{style:{fontSize:'11px',color:T.stone}},`via ${source}`));
    }
    inner.appendChild(statsRow);

    // Link
    const link = el('a', { href, style:{ fontFamily:F.body, fontWeight:600, fontSize:'14px', color:accent, textDecoration:'none', display:'inline-flex', alignItems:'center', gap:'6px' }});
    link.innerHTML = 'View the rules <span aria-hidden="true">→</span>';
    inner.appendChild(link);

    card.appendChild(inner);
    return card;
  }

  /* ── PageHero (dark banner with optional hex horizon) ────────────────── */
  function pageHero({ eyebrow, title, lede, accent = T.cosmicGlow, withHorizon = false, minHeight = 420 }) {
    const sec = el('section', { style:{ position:'relative', background:'#000', color:'#fff', overflow:'hidden', isolation:'isolate', minHeight:minHeight+'px' }});

    if (withHorizon) {
      const bg = el('div', { style:{ position:'absolute', inset:0, background:`linear-gradient(180deg, ${T.cosmicDeep} 0%, ${T.cosmicMid} 50%, #000 100%)` }});
      const hexLayer = el('div', { style:{ position:'absolute', inset:0, backgroundImage:HEX_BG, backgroundSize:'56px 64px', opacity:'0.6' }});
      const fade = el('div', { style:{ position:'absolute', inset:0, background:'linear-gradient(180deg, rgba(8,10,30,0.5) 0%, transparent 60%)', pointerEvents:'none' }});
      const fadeBottom = el('div', { style:{ position:'absolute', inset:0, background:'linear-gradient(180deg, transparent 60%, #000 100%)', pointerEvents:'none' }});
      sec.appendChild(bg); sec.appendChild(hexLayer); sec.appendChild(fade); sec.appendChild(fadeBottom);
    } else {
      const glow = el('div', { style:{ position:'absolute', right:'-150px', top:'30%', width:'700px', height:'700px', background:`radial-gradient(circle, rgba(58,123,232,0.22) 0%, transparent 65%)`, pointerEvents:'none' }});
      sec.appendChild(glow);
    }

      <p class="lede"><em>Catan</em> is popular. By some accounts, it's the most popular game of the modern era — a gateway game that's sold over 45 million copies and introduced countless families to a life of board-games beyond Monopoly.</p>
      <p>It's a game that enforces interaction between players. No silent solo turns. No retreating to a corner with a deck of cards. Every roll is a negotiation, every settlement a quiet provocation. You can't win <em>Catan</em> without talking to the people you're trying to beat — which is, when you think about it, both its genius and its source of all known dining-table arguments.</p>
      <h2>So we set it on fire.</h2>
      <p><em>Nuke Catan</em> is a total conversion of the base game. Same tiles, same dice, same little wooden settlers. Brand new economy.</p>
      <p>The premise: it's 2049. The island is now a contested post-nuclear wasteland. Sheep are extinct. Brick is currency. Wheat has been replaced by Rations. Wool by Scrap. And once per game, on your turn, you may — and probably should — play the Nuke card.</p>

      <p>The rule is short. The effect is permanent. And the ripple it sends through a four-player negotiation is, to put it mildly, instructive.</p>
      <h2>What we left intact.</h2>
      <ul>
        <li>The hex board. Same 19 tiles, same number tokens, same robber.</li>
        <li>The card decks. Resource cards are reskinned (Sheep → Scrap), but the development cards are untouched.</li>
        <li>The longest road and largest army awards. Both still grant 2 VP.</li>
        <li>The trading mechanic. You can still bank-trade 4:1, port-trade 3:1, and player-trade however you want.</li>
      </ul>
      <h2>What you'll need.</h2>
      <p>Your standard <em>Catan</em> base game and four printable cards (PDF in the download). That's it. No new tiles, no replacement components, no expansions required. It's a pure rules patch — which is, frankly, the whole point of what we do.</p>

      const g = document.createElementNS(ns,'g');

/* ── HEX TARGET PICKER ── */
const COLS = 9, ROWS = 5;
const hexes = [];
for (let r=0; r<ROWS; r++) {
  for (let c=0; c<COLS; c++) {
    hexes.push({ r, c, x: c*36 + (r%2)*18 + 25, y: r*31 + 22, id:`${r}-${c}` });
  }
}
const strikes = new Set();

function isFallout(h) {
  return [...strikes].some(id => {
    const [sr,sc] = id.split('-').map(Number);
    return (Math.abs(sr-h.r)+Math.abs(sc-h.c))===1;
  });
}

function renderHexMap() {
  const svg = document.getElementById('hex-svg');
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  hexes.forEach(h => {
    const struck = strikes.has(h.id);
    const fall = !struck && isFallout(h);
    const g = document.createElementNS(ns,'g');
    g.style.cursor = 'pointer';
    const poly = document.createElementNS(ns,'polygon');
    poly.setAttribute('transform',`translate(${h.x},${h.y})`);
    poly.setAttribute('points','0,-16 14,-8 14,8 0,16 -14,8 -14,-8');
    poly.setAttribute('fill', struck?'#d11a1a': fall?'#7a3a18':'rgba(255,255,255,0.06)');
    poly.setAttribute('stroke', struck?'#e63232':'rgba(255,255,255,0.25)');
    poly.setAttribute('stroke-width', struck?'2':'1');
    g.appendChild(poly);
    if (struck) {
      const t = document.createElementNS(ns,'text');
      t.setAttribute('x',h.x); t.setAttribute('y',h.y+5);
      t.setAttribute('font-size','14'); t.setAttribute('fill','#fff');
      t.setAttribute('text-anchor','middle'); t.setAttribute('pointer-events','none');
      t.textContent='☢'; g.appendChild(t);
    }
    if (fall) {
      const c2 = document.createElementNS(ns,'circle');
      c2.setAttribute('cx',h.x); c2.setAttribute('cy',h.y);
      c2.setAttribute('r','4'); c2.setAttribute('fill','#e89a1a');
      c2.setAttribute('pointer-events','none'); g.appendChild(c2);
    }
    g.addEventListener('click',()=>{
      if (!strikes.has(h.id)) { strikes.add(h.id); renderHexMap(); updateCount(); }
    });
    svg.appendChild(g);
  });
}

function updateCount() {
  const fallCount = hexes.filter(h => !strikes.has(h.id) && isFallout(h)).length;
  document.getElementById('strike-count').innerHTML = `Strikes: <strong style="color:#d11a1a">${strikes.size}</strong> · Fallout hexes: <strong>${fallCount}</strong>`;
}

document.getElementById('clear-btn').appendChild(btn('Clear board','outline-light',()=>{ strikes.clear(); renderHexMap(); updateCount(); },{color:'#14161c'}));

    advBtn.addEventListener('click',()=>{ zones[i].turns=Math.max(0,zones[i].turns-1); if(zones[i].turns===0) zones.splice(i,1); renderFallout(); });
    const rmBtn = document.createElement('button');

<script>
(function() {
  let history2 = ['index'];
  const barPages  = document.getElementById('preview-bar-pages');
  const backBtn   = document.getElementById('preview-bar-back');
  const frame     = document.getElementById('preview-frame');
  const navRoot   = document.getElementById('nav-root');
  const pageRoot  = document.getElementById('page-root');
  const footerRoot = document.getElementById('footer-root');

  document.getElementById('brand-cube').appendChild(MG.cubeSVG(20));

  let prevNav = null;
  PAGE_ORDER.forEach(pid => {
    const p = PAGES[pid];
    const b = document.createElement('button');
    b.className = 'pbtn';
    if (prevNav && p.nav !== prevNav) b.style.marginLeft = '8px';
    b.setAttribute('data-pid', pid);
    b.textContent = p.label;
    b.addEventListener('click', () => navigateTo(pid));
    barPages.appendChild(b);
    prevNav = p.nav;
  });

  backBtn.addEventListener('click', () => {
    if (history2.length > 1) { history2.pop(); navigateTo(history2[history2.length - 1], true); }
  });

  function interceptLinks(root) {
    root.querySelectorAll('a[href]').forEach(a => {
      const href = a.getAttribute('href');
      if (!href || href.startsWith('http') || href.startsWith('#') || href.startsWith('mailto')) return;
      const pid = href.replace('.html', '').replace(/^\.\//, '');
      if (PAGES[pid]) a.addEventListener('click', e => { e.preventDefault(); navigateTo(pid); });
    });
  }

  function navigateTo(pid, isBack) {
    if (!PAGES[pid]) return;
    if (!isBack) history2.push(pid);
    const p = PAGES[pid];

    let styleEl = document.getElementById('page-style');
    if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = 'page-style'; document.head.appendChild(styleEl); }
    styleEl.textContent = p.style || '';

    navRoot.innerHTML = '';
    navRoot.appendChild(MG.navbar(p.nav));

    pageRoot.innerHTML = p.html;

    footerRoot.innerHTML = '';
    footerRoot.appendChild(MG.footer());

    interceptLinks(navRoot);
    interceptLinks(pageRoot);
    interceptLinks(footerRoot);

    try {
      p.init(pageRoot);
      setTimeout(() => {
        interceptLinks(navRoot);
        interceptLinks(pageRoot);
        interceptLinks(footerRoot);
      }, 60);
    } catch (e) {
      console.error('Page init error for', pid, ':', e);
    }

    document.querySelectorAll('.pbtn').forEach(b =>
      b.classList.toggle('active', b.getAttribute('data-pid') === pid)
    );
    backBtn.style.display = history2.length > 1 ? 'block' : 'none';
    frame.scrollTop = 0;
  }

  navigateTo('index');
})();
</script>
