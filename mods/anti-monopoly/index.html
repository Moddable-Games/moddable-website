<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>Anti-Monopoly — Moddable.Games</title>
<link rel="stylesheet" href="../../css/_mg.css">
</head>
<body class="mg-section--dark">
<div id="nav-root"></div>

<section class="mod-hero">
  <div class="mod-hero__hex-bg" data-bg="red"></div>
  <div class="mod-hero__glow mod-hero__glow--red"></div>
  <div class="mod-hero__inner">
    <a href="../../mods/" class="mod-hero__back">&larr; All mods</a>
    <div class="mod-hero__tags">
      <span class="mod-hero__cat mod-hero__cat--red">Total conversion</span>
      <span class="mod-hero__base">base: Monopoly</span>
    </div>
    <h1 class="mod-hero__title mod-hero__title--red">Anti-Monopoly.</h1>
    <p class="mod-hero__lede">Two teams play by different rules on the same board: Monopolists charge high rent on monopolies; Competitors charge cost-price only. Published by Ralph Anspach in 1973.</p>
    <div class="mod-hero__btns" id="header-btns"></div>
    <div class="stats-row" id="stats-row"></div>
  </div>
</section>

<section class="mg-section mg-section--light">
  <div class="mg-container--narrow">
    <div id="rules-body"></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../../js/_mg.js"></script>
<script>
const { T, el, linkBtn, navbar, footer } = MG;
document.getElementById('nav-root').appendChild(navbar('Mods'));
document.getElementById('footer-root').appendChild(footer());

document.querySelector('.mod-hero__hex-bg').style.backgroundImage = `url('../../img/hex-grid-red.svg')`;

const hb = document.getElementById('header-btns');
hb.appendChild(linkBtn('Download PDF', '#', 'primary'));
hb.appendChild(linkBtn('View source', '#', 'outline-dark'));

const STATS = [['Players','2–6'],['Time','60 min'],['Age','10+'],['Source','Public domain variant'],['License','Public domain']];
const sr = document.getElementById('stats-row');
STATS.forEach(([k,v],i) => {
  if (i>0) sr.appendChild(el('span',{class:'stats-row__divider'}));
  const d = el('div',{class:'stats-row__item'});
  d.appendChild(el('span',{class:'stats-row__label'},k));
  d.appendChild(el('span',{class:'stats-row__value'},v));
  sr.appendChild(d);
});

const SECTIONS = [
  { id:'1', title:'Team selection', body:'At game start, each player secretly chooses Monopolist or Competitor. Their choice is revealed when they purchase their first property. This creates early-game uncertainty — you don\'t know who\'s on which team until money starts changing hands.' },
  { id:'2', title:'Monopolist rules', body:'Monopolists can form monopolies, charge full rent, and build houses and hotels. In exchange, they pay higher fees and taxes. Their strategy is aggressive: accumulate, dominate, and squeeze opponents.' },
  { id:'3', title:'Competitor rules', body:'Competitors charge cost-price rent only and cannot form monopolies. They pay lower fees and collect a higher salary when passing Go. Their strategy is defensive: survive, spread out, and outlast the Monopolists.' },
  { id:'4', title:'Antitrust', body:'If Monopolists collectively control too many properties (more than 60% of a colour group across all Monopolist players), a "trust-busting" event triggers. One Monopolist property is redistributed via auction to non-Monopolist players.' },
  { id:'5', title:'Victory', body:'Monopolists win by bankrupting all Competitors. Competitors win by bankrupting all Monopolists. If elimination is mixed (some from each team), the game goes to a points tally based on remaining assets.' },
];

const body2 = document.getElementById('rules-body');
SECTIONS.forEach(s => {
  const art = el('article',{class:'rules-section',id:`s${s.id}`});
  art.appendChild(el('div',{class:'rules-section__num rules-section__num--red'},`SECTION ${s.id.padStart(2,'0')}`));
  art.appendChild(el('h2',{class:'rules-section__title'},s.title));
  art.appendChild(el('p',{class:'rules-section__body'},s.body));
  body2.appendChild(art);
});
</script>
</body>
</html>
