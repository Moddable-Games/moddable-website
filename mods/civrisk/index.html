<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>CivRisk — Moddable.Games</title>
<link rel="stylesheet" href="../../css/_mg.css">
<link rel="stylesheet" href="../../css/mod-detail.css">
</head>
<body class="mg-section--dark">
<div id="nav-root"></div>

<section class="mod-hero">
  <div class="mod-hero__glow mod-hero__glow--green"></div>
  <div class="mod-hero__inner hero-anim">
    <a href="../../mods/" class="mod-hero__back">&larr; All mods</a>
    <div class="mod-hero__tags">
      <span class="mod-hero__cat mod-hero__cat--green">Rebalance</span>
      <span class="mod-hero__base">base: Risk</span>
      <span class="mod-hero__version">v1.0.0</span>
    </div>
    <h1 class="mod-hero__title mod-hero__title--green">Civ<em>Risk</em>.</h1>
    <p class="mod-hero__lede">Risk rewritten to play like Civilisation: choose a civilisation and leader, build through growth tiers, discover ruins and barbarian camps. Chris Grey, 2023. ePub rules free to download.</p>
    <div class="mod-hero__btns" id="header-btns"></div>
    <div class="stats-row" id="stats-row"></div>
  </div>
</section>

<section class="mg-section mg-section--light">
  <div class="mg-container rules-layout">
    <aside class="rules-sidebar">
      <div class="mg-eyebrow mg-eyebrow--green">THE RULES</div>
      <ol id="toc" class="toc-list"></ol>
    </aside>
    <div id="rules-body"></div>
  </div>
</section>

<section class="mg-section mg-section--light mg-section--flush-top">
  <div class="mg-container">
    <h2 class="mg-heading-xl">What you'll need.</h2>
    <div id="components-grid" class="mg-grid-3"></div>
  </div>
</section>

<section class="mg-section mg-section--white mg-section--border-top">
  <div class="mg-container">
    <h2 class="related-heading">More from the library.</h2>
    <div id="related-grid" class="mg-grid-3" data-stagger></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../../js/mg-loader.js"></script>
<script>
const { T, el, linkBtn, navbar, footer, modCard } = MG;
document.getElementById('nav-root').appendChild(navbar('Mods'));
document.getElementById('footer-root').appendChild(footer());

const hb = document.getElementById('header-btns');
hb.appendChild(linkBtn('Download PDF', '#', 'primary'));
hb.appendChild(linkBtn('View source', '#', 'outline-dark'));

const STATS = [['Players','3–5'],['Time','180 min'],['Age','14+'],['Designer','Chris Grey'],['Year','2023']];
const sr = document.getElementById('stats-row');
STATS.forEach(([k,v],i) => {
  if (i>0) sr.appendChild(el('span',{class:'stats-row__divider'}));
  const d = el('div',{class:'stats-row__item'});
  d.appendChild(el('span',{class:'stats-row__label'},k));
  d.appendChild(el('span',{class:'stats-row__value'},v));
  sr.appendChild(d);
});

const SECTIONS = [
  { id:'1', title:'Civilisations', body:"20 unique civilisations with asymmetric abilities. Each starts with a capital territory and a unique leader power. Leaders grant a one-time ability that can swing early-game positioning." },
  { id:'2', title:'Growth tiers', body:"Progress through Ancient → Classical → Medieval → Industrial → Modern. Each tier unlocks new unit types and abilities. Advancing requires controlling a minimum number of territories plus spending gold." },
  { id:'3', title:'Ruins & barbarians', body:"The map starts with hidden discovery tokens. Reveal them by occupying a territory: gold, technologies, or barbarian ambushes. Barbarians spawn as neutral armies that must be defeated before claiming the territory." },
  { id:'4', title:'Technologies', body:"Spend gold to research techs (one per turn). Techs give permanent bonuses: +1 defense, naval movement, siege weapons, etc. The tech tree has 15 nodes arranged in three branches: military, economic, and cultural." },
  { id:'5', title:'Victory', body:"Control 60% of territories OR complete 3 civilisation-specific objectives (unique per civ). Objectives range from controlling specific continents to reaching the Modern tier first to accumulating gold thresholds." },
];

const toc = document.getElementById('toc');
const body2 = document.getElementById('rules-body');
SECTIONS.forEach(s => {
  const li = el('li');
  const a = el('a',{href:`#s${s.id}`,class:'toc-list__link'});
  a.appendChild(el('span',{class:'toc-list__num'},s.id.padStart(2,'0')));
  a.appendChild(document.createTextNode(s.title));
  li.appendChild(a); toc.appendChild(li);

  const art = el('article',{class:'rules-section',id:`s${s.id}`});
  art.appendChild(el('div',{class:'rules-section__num'},`SECTION ${s.id.padStart(2,'0')}`));
  art.appendChild(el('h2',{class:'rules-section__title'},s.title));
  art.appendChild(el('p',{class:'rules-section__body'},s.body));
  body2.appendChild(art);
});

const COMPONENTS = [
  { kind:'Required', list:['Risk base game (any edition with world map)','Army pieces for 3–5 players','Standard Risk cards and dice'] },
  { kind:'Printable', list:['Civilisation cards (20 unique, PDF included)','Tech tree reference board','Discovery tokens (cut-out sheet)'] },
  { kind:'House', list:['Gold tokens (coins, beads, or paper chits)','Hidden discovery tokens (face-down on map)','Growth tier tracker (one per player)'] },
];
const cg = document.getElementById('components-grid');
COMPONENTS.forEach(({kind,list}) => {
  const c = el('div',{class:'mg-card'});
  c.appendChild(el('div',{class:'mg-card__eyebrow mg-eyebrow--green'},kind.toUpperCase()));
  const ul = el('ul',{class:'component-list'});
  list.forEach(x => {
    const li = el('li',{class:'component-list__item'});
    li.appendChild(el('span',{class:'component-list__bullet'}));
    li.appendChild(document.createTextNode(x));
    ul.appendChild(li);
  });
  c.appendChild(ul); cg.appendChild(c);
});

const RELATED_TITLES = ['Custom World Risk', 'Shattered Ascension', 'Hyper Imperium'];
const RELATED = RELATED_TITLES.map(t => {
  const m = MG.ALL_MODS.find(x => x.title === t);
  return Object.assign({}, m, { href: '../' + m.href.split('/mods/')[1] });
});
const rg = document.getElementById('related-grid');
RELATED.forEach(m => rg.appendChild(modCard(m)));
</script>
</body>
</html>
