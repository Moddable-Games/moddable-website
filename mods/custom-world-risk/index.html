<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>Custom World Risk — Moddable.Games</title>
<link rel="stylesheet" href="../../css/_mg.css">
</head>
<body class="mg-section--dark">
<div id="nav-root"></div>

<section class="compact-hero">
  <div class="compact-hero__gradient"></div>
  <div class="compact-hero__hex" data-bg="blue"></div>
  <div class="compact-hero__fade"></div>
  <div class="compact-hero__inner">
    <a href="../../mods/" class="mod-hero__back">&larr; All mods</a>
    <div class="mod-hero__tags">
      <span class="mod-hero__cat mod-hero__cat--blue">Reskin</span>
      <span class="mod-hero__base">Risk &middot; Community</span>
    </div>
    <h1 class="compact-hero__title">Custom World Risk</h1>
    <p class="compact-hero__lede">Replace the standard board with your own map — Middle-earth, a fantasy continent, your neighbourhood. The rules stay identical, only the geography changes.</p>
    <div class="compact-hero__stats">
      <span>2–6 players</span><span>120 min</span><span>12+</span>
    </div>
  </div>
</section>

<section class="mg-section mg-section--light">
  <div class="mg-container--text">
    <div id="rules" class="rules-list"></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../../js/_mg.js"></script>
<script>
const { el, navbar, footer } = MG;
document.getElementById('nav-root').appendChild(navbar('Mods'));
document.getElementById('footer-root').appendChild(footer());

document.querySelector('.compact-hero__hex').style.backgroundImage = `url('../../img/hex-grid-blue.svg')`;

const RULES = [
  { n:'01', title:'Choose your world', body:'Any map works — draw your own, print a fantasy continent, or use a historical map. Divide it into 30-50 territories with clear borders and connections.' },
  { n:'02', title:'Define continents', body:'Group territories into 4-6 continents. Assign continent bonuses proportional to difficulty of holding them (fewer borders = higher bonus).' },
  { n:'03', title:'Connection rules', body:'Adjacent territories can attack each other. For islands or separated regions, mark sea routes (dashed lines) that function as single-territory crossings.' },
  { n:'04', title:'Setup & play', body:'Standard Risk rules apply from here: deal territories, place armies, take turns (reinforce → attack → fortify). All card mechanics unchanged.' },
  { n:'05', title:'Sharing your map', body:'Upload your custom board to the community. Include: territory list, continent groupings, connection diagram, and recommended player count.' },
];

const rulesEl = document.getElementById('rules');
RULES.forEach(r => {
  const item = el('div', {class:'rules-list__item'});
  item.appendChild(el('div', {class:'rules-list__num mg-eyebrow--blue'}, `${r.n}`));
  item.appendChild(el('h2', {class:'rules-list__title'}, r.title));
  item.appendChild(el('p', {class:'rules-list__body'}, r.body));
  rulesEl.appendChild(item);
});
</script>
</body>
</html>
