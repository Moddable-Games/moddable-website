<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>Flooded Catan — Moddable.Games</title>
<link rel="stylesheet" href="../../css/_mg.css">
<link rel="stylesheet" href="../../css/mod-detail.css">
</head>
<body class="mg-section--dark">
<div id="nav-root"></div>

<section class="mod-hero">
  <div class="mod-hero__glow mod-hero__glow--green"></div>
  <div class="mod-hero__inner hero-anim">
    <a href="../../mods/" class="mod-hero__back">&larr; All mods</a>
    <div class="mod-hero__tags">
      <span class="mod-hero__cat mod-hero__cat--green">Rebalance</span>
      <span class="mod-hero__base">base: Catan</span>
      <span class="mod-hero__version">v1.0.0</span>
    </div>
    <h1 class="mod-hero__title">Flooded Catan.</h1>
    <p class="mod-hero__lede">Community variant from the Catan Wiki: tiles flood every few rounds. Players can win by being the last settlement standing, not just by hitting 10 VP.</p>
    <div class="mod-hero__btns" id="header-btns"></div>
    <div class="stats-row" id="stats-row"></div>
  </div>
</section>

<section class="mg-section mg-section--light">
  <div class="mg-container rules-layout">
    <aside class="rules-sidebar">
      <div class="mg-eyebrow mg-eyebrow--green">THE RULES</div>
      <ol id="toc" class="toc-list"></ol>
    </aside>
    <div id="rules-body"></div>
  </div>
</section>

<section class="mg-section mg-section--light mg-section--flush-top">
  <div class="mg-container">
    <h2 class="mg-heading-xl">What you'll need.</h2>
    <div id="components-grid" class="mg-grid-3"></div>
  </div>
</section>

<section class="mg-section mg-section--white mg-section--border-top">
  <div class="mg-container">
    <h2 class="related-heading">More from the library.</h2>
    <div id="related-grid" class="mg-grid-3" data-stagger></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../../js/mg-loader.js"></script>
<script>
const { T, el, linkBtn, navbar, footer, modCard } = MG;
document.getElementById('nav-root').appendChild(navbar('Mods'));
document.getElementById('footer-root').appendChild(footer());

const hb = document.getElementById('header-btns');
hb.appendChild(linkBtn('Download PDF', '#', 'primary'));
hb.appendChild(linkBtn('View source', '#', 'outline-dark'));

const STATS = [['Players','3–4'],['Time','75 min'],['Age','10+'],['Source','catan.fandom.com'],['License','Community / fan-made']];
const sr = document.getElementById('stats-row');
STATS.forEach(([k,v],i) => {
  if (i>0) sr.appendChild(el('span',{class:'stats-row__divider'}));
  const d = el('div',{class:'stats-row__item'});
  d.appendChild(el('span',{class:'stats-row__label'},k));
  d.appendChild(el('span',{class:'stats-row__value'},v));
  sr.appendChild(d);
});

const SECTIONS = [
  { id:'1', title:'Flood timer', body:'Every 4 turns, the lowest-numbered coastal hex floods — flip it face-down. Flooded hexes produce no resources, and no new buildings can be placed on their edges or vertices. The island is shrinking.' },
  { id:'2', title:'Rising waters', body:'After turn 16, two hexes flood per cycle instead of one. The pace of destruction accelerates, forcing players toward the centre of the island and creating desperate last-stand scenarios.' },
  { id:'3', title:'Survival victory', body:'If only one player has settlements or cities on non-flooded hexes, they win immediately — regardless of VP count. This alternate win condition rewards geographic strategy over pure economic play.' },
  { id:'4', title:'Seawalls', body:'New structure: costs 2 brick + 1 wood. Placed on a hex edge, a seawall delays flooding of the adjacent hex by one full cycle. Limited to 3 per player. Placement timing is critical.' },
  { id:'5', title:'Refugees', body:'When a settlement is flooded, the owning player may relocate it to any legal empty intersection for 1 grain + 1 wood. Cities cannot be relocated — they are lost permanently. Plan your city upgrades carefully.' },
];

const toc = document.getElementById('toc');
const body2 = document.getElementById('rules-body');
SECTIONS.forEach(s => {
  const li = el('li');
  const a = el('a',{href:`#s${s.id}`,class:'toc-list__link'});
  a.appendChild(el('span',{class:'toc-list__num'},s.id.padStart(2,'0')));
  a.appendChild(document.createTextNode(s.title));
  li.appendChild(a); toc.appendChild(li);

  const art = el('article',{class:'rules-section',id:`s${s.id}`});
  art.appendChild(el('div',{class:'rules-section__num'},`SECTION ${s.id.padStart(2,'0')}`));
  art.appendChild(el('h2',{class:'rules-section__title'},s.title));
  art.appendChild(el('p',{class:'rules-section__body'},s.body));
  body2.appendChild(art);
});

const COMPONENTS = [
  { kind:'Required', list:['Catan base game (any edition)','All hex tiles, number tokens, and resource cards','Standard building pieces and roads'] },
  { kind:'Printable', list:['Flood tracker sheet (PDF, included)','Seawall tokens (cut-out sheet)','Turn counter strip'] },
  { kind:'House', list:['Blue tokens or coins to mark flooded hexes','Numbered list of coastal hexes for flood order','Timer or turn counter (app recommended)'] },
];
const cg = document.getElementById('components-grid');
COMPONENTS.forEach(({kind,list}) => {
  const c = el('div',{class:'mg-card'});
  c.appendChild(el('div',{class:'mg-card__eyebrow mg-eyebrow--green'},kind.toUpperCase()));
  const ul = el('ul',{class:'component-list'});
  list.forEach(x => {
    const li = el('li',{class:'component-list__item'});
    li.appendChild(el('span',{class:'component-list__bullet'}));
    li.appendChild(document.createTextNode(x));
    ul.appendChild(li);
  });
  c.appendChild(ul); cg.appendChild(c);
});

const RELATED = [
  { category:'Total conversion', baseGame:'Catan', title:'Nuke Catan', body:"Post-apocalyptic overhaul. Sheep are scarce, brick is currency.", stats:'3–5 players · 60 min · 12+', href:'../nuke-catan/' },
  { category:'Total conversion', baseGame:'Catan', title:'The Diamond Mine', body:"Replace hexes with mine shafts. Push-your-luck digging replaces dice rolls.", stats:'3–4 players · 45 min · 12+', href:'../the-diamond-mine/' },
  { category:'Rebalance', baseGame:'Twilight Imperium 4e', title:'Hyper Imperium', body:"Hyper Movement, Hyper Trades, Hyper Agendas. A faster TI4 ruleset.", stats:'3–6 players · 4–6 hr · 14+', href:'../hyper-imperium/' },
];
const rg = document.getElementById('related-grid');
RELATED.forEach(m => rg.appendChild(modCard(m)));
</script>
</body>
</html>
