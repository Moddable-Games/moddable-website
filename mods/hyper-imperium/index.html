<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>Hyper Imperium — Moddable.Games</title>
<link rel="stylesheet" href="../../css/_mg.css">
<link rel="stylesheet" href="../../css/mod-detail.css">
</head>
<body class="mg-section--dark" data-accent="green" data-mod="hyper-imperium">
<div id="nav-root"></div>

<section class="mod-hero">
  <img src="../../img/hex-grid-blue.svg" alt="" class="mod-hero__hex">
  <div class="mod-hero__glow mod-hero__glow--green"></div>
  <div class="mod-hero__inner hero-anim">
    <a href="../../mods/" class="mod-hero__back">&larr; All mods</a>
    <div class="mod-hero__tags">
      <span class="mod-hero__cat mod-hero__cat--green">Rebalance</span>
      <span class="mod-hero__base">base: Twilight Imperium 4e</span>
      <span class="mod-hero__version">v2.0.1</span>
    </div>
    <h1 class="mod-hero__title">Hyper <em>Imperium</em>.</h1>
    <p class="mod-hero__lede">Hyper Movement, Hyper Trades, Hyper Objectives, Hyper Factions, Hyper Agendas. A faster ruleset for TI4 + Prophecy of Kings that keeps the politics intact.</p>
    <div class="mod-hero__btns" id="header-btns"></div>
    <div class="stats-row" id="stats-row"></div>
  </div>
</section>

<section class="mg-section mg-section--light">
  <div class="mg-container rules-layout">
    <aside class="rules-sidebar">
      <div class="mg-eyebrow mg-eyebrow--green">THE RULES</div>
      <ol id="toc" class="toc-list"></ol>
    </aside>
    <div id="rules-body"></div>
  </div>
</section>

<section class="mg-section mg-section--light mg-section--flush-top">
  <div class="mg-container">
    <h2 class="mg-heading-xl">What you'll need.</h2>
    <div id="components-grid" class="mg-grid-3"></div>
  </div>
</section>

<section class="mg-section mg-section--white mg-section--border-top">
  <div class="mg-container">
    <h2 class="related-heading">More from the library.</h2>
    <div id="related-grid" class="mg-grid-3" data-stagger></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../../js/mg-loader.js"></script>
</body>
</html>
