<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>All mods — Moddable.Games</title>
<link rel="stylesheet" href="../css/_mg.css">
<link rel="stylesheet" href="../css/mods.css">
</head>
<body>
<div id="nav-root"></div>

<!-- Page hero -->
<section class="mods-hero">
  <div class="mods-hero__bloom"></div>
  <div class="mods-hero__inner">
    <div class="mg-eyebrow mg-eyebrow--glow">THE LIBRARY</div>
    <h1 class="mods-hero__title">All mods. One library.</h1>
    <p class="mods-hero__lede" id="hero-sub"></p>
  </div>
</section>

<!-- Filter + grid -->
<section class="mods-filter">
  <div class="mods-filter__inner">
    <div class="mods-filter__bar">
      <div class="mods-filter__search-wrap">
        <input id="search-input" type="search" placeholder="Search mods or a base game…" class="mods-filter__search">
        <span class="mods-filter__search-icon">&#8981;</span>
      </div>
      <div id="cat-filters" class="mods-filter__cats"></div>
    </div>
    <div class="mods-filter__meta">
      <div id="count-label" class="mods-filter__count"></div>
      <div class="mods-filter__sort">Sorted by base game</div>
    </div>
    <div id="mods-grid" class="mg-grid-auto" data-stagger></div>
    <div id="empty-state" class="mods-empty">
      <div class="mg-eyebrow mg-eyebrow--red">NO MATCH</div>
      <h3 class="mods-empty__title">Nothing in the library matches.</h3>
      <p class="mods-empty__body">Want to write the mod yourself?</p>
      <a href="../submit/" class="mods-empty__link">Submit a mod</a>
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../js/mg-loader.js"></script>
<script>
const { navbar, footer, modCard, url } = MG;
document.getElementById('nav-root').appendChild(navbar('Mods'));
document.getElementById('footer-root').appendChild(footer());

const ALL_MODS = [
  // ── Moddable originals ──────────────────────────────────────────────────
  { category:'Reskin',           baseGame:'Talisman 4e',
    title:'Talisman: Hexed',
    body:"Replaces the Talisman boards with 61 hexagonal tiles arranged in concentric rings — open-world hex system, every game lays out differently.",
    stats:'2–6 players · 90 min · 13+', href:url('/mods/talisman-hexed/'), source:'Moddable.Games' },

  { category:'Rebalance',        baseGame:'Twilight Imperium 4e',
    title:'Hyper Imperium',
    body:"Hyper Movement, Hyper Trades, Hyper Objectives. A faster ruleset for TI4 + Prophecy of Kings that keeps the politics intact.",
    stats:'3–6 players · 4–6 hr · 14+', href:url('/mods/hyper-imperium/'), source:'Moddable.Games' },

  { category:'Total conversion', baseGame:'Catan',
    title:'Nuke Catan',
    body:"Post-apocalyptic overhaul. Sheep are scarce, brick is currency. Once per game, a player may press The Button — one hex is permanently irradiated.",
    stats:'3–5 players · 60 min · 12+', href:url('/mods/nuke-catan/'), source:'Moddable.Games' },

  // ── Community & publicly available variants ────────────────────────────
  { category:'Total conversion', baseGame:'Chess',
    title:'Fog of War Chess',
    body:"Players see only the squares their own pieces can legally move to — no checks, no checkmates, only capture the king. Invented by Jens Bæk Nielsen & Torben Osted (1989).",
    stats:'2 players · 20–40 min · 10+', href:url('/mods/fog-of-war-chess/'), source:'chessvariants.com' },

  { category:'Reskin',           baseGame:'Chess',
    title:'4-Player Chess',
    body:"Four players, four armies, one board. Free-for-all or teams. The de facto standard for multi-player chess — widely available on chess.com and as PnP.",
    stats:'4 players · 30 min · 10+', href:url('/mods/4-player-chess/'), source:'chess.com/variants' },

  { category:'Total conversion', baseGame:'Chess',
    title:'Hexagonal Chess (Glinski)',
    body:"Władysław Gliński's 1936 hex-board variant. 91 hexagonal cells, 9 pawns per side, bishops that each stay on one of three cell colours. Fully documented and free to print.",
    stats:'2 players · 30–60 min · 12+', href:url('/mods/hexagonal-chess/'), source:'chessvariants.com' },

  { category:'Rebalance',        baseGame:'Monopoly',
    title:'Econopoly',
    body:"Monopoly with a working economy. Anti-monopoly rules, dynamic property pricing, and a tax band that actually does something. 95% complete — launch ready.",
    stats:'2–6 players · 60 min · 10+', href:url('/mods/econopoly/'), source:'Moddable.Games' },

  { category:'Total conversion', baseGame:'Monopoly',
    title:'Anti-Monopoly',
    body:"Two teams play by different rules on the same board: Monopolists charge high rent on monopolies; Competitors charge cost-price only. Published by Ralph Anspach in 1973.",
    stats:'2–6 players · 60 min · 10+', href:url('/mods/anti-monopoly/'), source:'Public domain variant' },

  { category:'Rebalance',        baseGame:'Catan',
    title:'Flooded Catan',
    body:"Community variant from the Catan Wiki: tiles flood every few rounds. Players can win by being the last settlement standing, not just by hitting 10 VP.",
    stats:'3–4 players · 75 min · 10+', href:url('/mods/flooded-catan/'), source:'catan.fandom.com' },

  { category:'Total conversion', baseGame:'Catan',
    title:'The Diamond Mine',
    body:"A single-hex unofficial expansion: swap one pasture for the diamond mine. Diamonds substitute for ore in development card purchases. Self-contained rules, free to print.",
    stats:'3–4 players · 60 min · 10+', href:url('/mods/the-diamond-mine/'), source:'scribd.com — meepleeater' },

  { category:'Rebalance',        baseGame:'Twilight Imperium 4e',
    title:'Shattered Ascension',
    body:"PsiComa's decade-long TI3 remix — rebalanced factions, overhauled agenda phase, new card sets. The most thorough community TI variant in existence. Tabletop Simulator module available.",
    stats:'3–8 players · 6–12 hr · 16+', href:url('/mods/shattered-ascension/'), source:'boardgamegeek.com' },

  { category:'Rebalance',        baseGame:'Risk',
    title:'CivRisk',
    body:"Risk rewritten to play like Civilisation: choose a civilisation and leader, build through growth tiers, discover ruins and barbarian camps. Chris Grey, 2023. ePub rules free to download.",
    stats:'3–5 players · 180 min · 14+', href:url('/mods/civrisk/'), source:'Chris Grey — self-published' },

  { category:'Reskin',           baseGame:'Risk',
    title:'Custom World Risk',
    body:"Replace the standard board with your own map — Middle-earth, a fantasy continent, your neighbourhood. The rules stay identical, only the geography changes.",
    stats:'2–6 players · 120 min · 12+', href:url('/mods/custom-world-risk/'), source:'Community / BGG' },
];

const filters = ['All','Total conversion','Rebalance','Reskin'];
let activeCat = 'All', searchVal = '';

document.getElementById('hero-sub').textContent = `${ALL_MODS.length} rulebook mods across ${new Set(ALL_MODS.map(m=>m.baseGame)).size} base games. Filter by mod-type, or search for the one you already own.`;

function renderFilters() {
  const el2 = document.getElementById('cat-filters');
  el2.innerHTML = '';
  filters.forEach(f => {
    const a = f === activeCat;
    const b = document.createElement('button');
    b.textContent = f;
    Object.assign(b.style, { fontFamily:'var(--mg-font-body)', fontWeight:600, fontSize:'13px', height:'36px', padding:'0 14px', borderRadius:'9999px', border: a?'none':'1px solid #c3c5cc', background: a?'#000':'transparent', color: a?'#fff':'#14161c', cursor:'pointer', transition:'all 150ms' });
    b.addEventListener('click', () => { activeCat = f; renderFilters(); renderGrid(); });
    el2.appendChild(b);
  });
}

function renderGrid() {
  const q = searchVal.toLowerCase();
  const visible = ALL_MODS.filter(m =>
    (activeCat === 'All' || m.category === activeCat) &&
    (!q || m.title.toLowerCase().includes(q) || m.baseGame.toLowerCase().includes(q))
  );
  const grid = document.getElementById('mods-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';
  document.getElementById('count-label').textContent = `${visible.length} OF ${ALL_MODS.length} MODS`;
  if (visible.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  visible.forEach(m => grid.appendChild(MG.modCard(m)));
  MG.initReveal();
}

document.getElementById('search-input').addEventListener('input', e => { searchVal = e.target.value; renderGrid(); });

// Pre-filter from URL hash (e.g. /mods/#Total%20conversion)
const hashCat = decodeURIComponent(location.hash.slice(1));
if (hashCat && filters.includes(hashCat)) activeCat = hashCat;
renderFilters(); renderGrid();
</script>
</body>
</html>
