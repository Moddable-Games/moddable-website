<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>All mods — Moddable.Games</title>
<link rel="stylesheet" href="../css/_mg.css">
<link rel="stylesheet" href="../css/mods.css">
</head>
<body>
<div id="nav-root"></div>

<!-- Page hero -->
<section class="mods-hero">
  <div class="mods-hero__bloom"></div>
  <div class="mods-hero__inner">
    <div class="mg-eyebrow mg-eyebrow--glow">THE LIBRARY</div>
    <h1 class="mods-hero__title">All mods. One library.</h1>
    <p class="mods-hero__lede" id="hero-sub"></p>
  </div>
</section>

<!-- Filter + grid -->
<section class="mods-filter">
  <div class="mods-filter__inner">
    <div class="mods-filter__bar">
      <div class="mods-filter__search-wrap">
        <input id="search-input" type="search" placeholder="Search mods or a base game…" class="mods-filter__search">
        <span class="mods-filter__search-icon">&#8981;</span>
      </div>
      <div id="cat-filters" class="mods-filter__cats"></div>
    </div>
    <div class="mods-filter__meta">
      <div id="count-label" class="mods-filter__count"></div>
      <div class="mods-filter__sort">Sorted by base game</div>
    </div>
    <div id="mods-grid" class="mg-grid-auto" data-stagger></div>
    <div id="empty-state" class="mods-empty">
      <div class="mg-eyebrow mg-eyebrow--red">NO MATCH</div>
      <h3 class="mods-empty__title">Nothing in the library matches.</h3>
      <p class="mods-empty__body">Want to write the mod yourself?</p>
      <a href="../submit/" class="mods-empty__link">Submit a mod</a>
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../js/mg-loader.js"></script>
<script>
const { navbar, footer, modCard, url } = MG;
document.getElementById('nav-root').appendChild(navbar('Mods'));
document.getElementById('footer-root').appendChild(footer());

const ALL_MODS = MG.ALL_MODS;

const filters = ['All','Total conversion','Rebalance','Reskin'];
let activeCat = 'All', searchVal = '';

document.getElementById('hero-sub').textContent = `${ALL_MODS.length} rulebook mods across ${new Set(ALL_MODS.map(m=>m.baseGame)).size} base games. Filter by mod-type, or search for the one you already own.`;

function renderFilters() {
  const el2 = document.getElementById('cat-filters');
  el2.innerHTML = '';
  filters.forEach(f => {
    const a = f === activeCat;
    const b = document.createElement('button');
    b.textContent = f;
    Object.assign(b.style, { fontFamily:'var(--mg-font-body)', fontWeight:600, fontSize:'13px', height:'36px', padding:'0 14px', borderRadius:'9999px', border: a?'none':'1px solid #c3c5cc', background: a?'#000':'transparent', color: a?'#fff':'#14161c', cursor:'pointer', transition:'all 150ms' });
    b.addEventListener('click', () => { activeCat = f; renderFilters(); renderGrid(); });
    el2.appendChild(b);
  });
}

function renderGrid() {
  const q = searchVal.toLowerCase();
  const visible = ALL_MODS.filter(m =>
    (activeCat === 'All' || m.category === activeCat) &&
    (!q || m.title.toLowerCase().includes(q) || m.baseGame.toLowerCase().includes(q))
  );
  const grid = document.getElementById('mods-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';
  document.getElementById('count-label').textContent = `${visible.length} OF ${ALL_MODS.length} MODS`;
  if (visible.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  visible.forEach(m => grid.appendChild(MG.modCard(m)));
  MG.initReveal();
}

document.getElementById('search-input').addEventListener('input', e => { searchVal = e.target.value; renderGrid(); });

// Pre-filter from URL hash (e.g. /mods/#Total%20conversion)
const hashCat = decodeURIComponent(location.hash.slice(1));
if (hashCat && filters.includes(hashCat)) activeCat = hashCat;
renderFilters(); renderGrid();
</script>
</body>
</html>
