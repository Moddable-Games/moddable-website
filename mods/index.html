<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/img/favicon-32x32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0a0d2a">
<title>Mods — Moddable.Games</title>
<meta name="description" content="Browse 10 community-built rulebook mods for board games you already own.">
<meta property="og:title" content="Mods">
<meta property="og:description" content="Browse 10 community-built rulebook mods for board games you already own.">
<meta property="og:url" content="https://web.moddable.games/mods/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Moddable.Games">
<meta property="og:image" content="https://web.moddable.games/img/og/mods.png?v=1.0.36">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Mods">
<meta name="twitter:description" content="Browse 10 community-built rulebook mods for board games you already own.">
<meta name="twitter:image" content="https://web.moddable.games/img/og/mods.png?v=1.0.36">
<link rel="stylesheet" href="../css/_mg.css?v=1.0.36">
<link rel="stylesheet" href="../css/mods.css?v=1.0.36">
</head>
<body>
<div id="nav-root"></div>

<!-- Page hero -->
<section class="mods-hero">
  <div class="mods-hero__bloom"></div>
  <div class="mods-hero__inner">
    <div class="mg-eyebrow mg-eyebrow--glow">THE LIBRARY</div>
    <h1 class="mods-hero__title">Mods. One library.</h1>
    <p class="mods-hero__lede" id="hero-sub"></p>
  </div>
</section>

<!-- Filter + grid -->
<section class="mods-filter">
  <div class="mods-filter__inner">
    <div class="mods-filter__bar">
      <div class="mods-filter__search-wrap">
        <input id="search-input" type="search" placeholder="Search mods or a base game…" class="mods-filter__search">
        <span class="mods-filter__search-icon">&#8981;</span>
      </div>
      <div id="cat-filters" class="mods-filter__cats"></div>
    </div>
    <div class="mods-filter__meta">
      <div id="count-label" class="mods-filter__count"></div>
      <div class="mods-filter__sort">Sorted by base game</div>
    </div>
    <div id="mods-grid" class="mg-grid-auto" data-stagger></div>
    <div id="empty-state" class="mods-empty">
      <div class="mg-eyebrow mg-eyebrow--red">NO MATCH</div>
      <h3 class="mods-empty__title">Nothing in the library matches.</h3>
      <p class="mods-empty__body">Want to write the mod yourself?</p>
      <a href="../submit/" class="mods-empty__link">Submit a mod</a>
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../js/mg-loader.js?v=1.0.36"></script>
<script src="../js/mg-mods-index-page.js?v=1.0.36"></script>
</body>
</html>
