<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>Nuke Catan — Moddable.Games</title>
<link rel="stylesheet" href="../../css/_mg.css">
</head>
<body class="mg-section--dark">
<div id="nav-root"></div>

<section class="mod-hero">
  <img src="../../img/hex-grid-red.svg" alt="" class="mod-hero__hex">
  <div class="mod-hero__glow mod-hero__glow--red"></div>
  <div class="mod-hero__inner hero-anim">
    <a href="../../mods/" class="mod-hero__back">&larr; All mods</a>
    <div class="mod-hero__tags">
      <span class="mod-hero__cat mod-hero__cat--red">Total conversion</span>
      <span class="mod-hero__base">base: Catan</span>
    </div>
    <h1 class="mod-hero__title mod-hero__title--red">Nuke <em>Catan</em>.</h1>
    <p class="mod-hero__lede">Post-apocalyptic overhaul. Sheep are scarce, brick is currency. Once per game, a player may press The Button &mdash; one hex is permanently irradiated.</p>
    <div class="mod-hero__btns" id="header-btns"></div>
    <div class="stats-row" id="stats-row"></div>
  </div>
</section>

<section class="mg-section mg-section--light">
  <div class="mg-container--narrow">
    <div id="rules-body"></div>
  </div>
</section>

<section class="mg-section mg-section--white mg-section--border-top">
  <div class="mg-container">
    <h2 class="related-heading">More from the library.</h2>
    <div id="related-grid" class="mg-grid-3" data-stagger></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../../js/_mg.js"></script>
<script>
const { T, el, linkBtn, navbar, footer, modCard } = MG;
document.getElementById('nav-root').appendChild(navbar('Mods'));
document.getElementById('footer-root').appendChild(footer());

const hb = document.getElementById('header-btns');
hb.appendChild(linkBtn('Download PDF', '#', 'primary'));
hb.appendChild(linkBtn('View on GitHub', '#', 'outline-dark'));

const STATS = [['Players','3–5'],['Time','60 min'],['Age','12+'],['Source','Moddable.Games'],['License','CC BY-NC-SA']];
const sr = document.getElementById('stats-row');
STATS.forEach(([k,v],i) => {
  if (i>0) sr.appendChild(el('span',{class:'stats-row__divider'}));
  const d = el('div',{class:'stats-row__item'});
  d.appendChild(el('span',{class:'stats-row__label'},k));
  d.appendChild(el('span',{class:'stats-row__value'},v));
  sr.appendChild(d);
});

const SECTIONS = [
  { id:'1', title:'The new economy', body:"Brick replaces wheat as the core currency. All development cards cost brick. Roads cost 1 brick + 1 wood (unchanged). Settlements cost 2 brick + 1 wood + 1 sheep. Sheep produce at half rate — only on even dice rolls. Ore remains unchanged but gains value as a Bunker component." },
  { id:'2', title:'Radiation tokens', body:"When The Button is pressed, the target hex and all adjacent hexes become irradiated. Place radiation tokens on each affected hex. Irradiated hexes produce nothing regardless of dice rolls. No new roads or settlements may be built on irradiated edges or intersections. Existing structures on irradiated hexes still count for VP but produce nothing." },
  { id:'3', title:'Bunkers', body:"A new structure type. Costs 3 brick + 1 ore to build. May be placed on any settlement or city you own. A Bunker protects the settlement from radiation — the settlement continues producing from adjacent non-irradiated hexes, and the intersection remains buildable. Bunkers do not protect roads." },
  { id:'4', title:'Victory conditions', body:"The game ends when a player reaches 8 VP (reduced from 10) OR when only one player has at least one non-irradiated settlement remaining. In the latter case, that player wins regardless of VP count. Longest Road and Largest Army still award 2 VP each." },
  { id:'5', title:'The Button', body:"Once per game, each player may press The Button on their turn (before or after rolling). Choose any hex on the board — it and all adjacent hexes are irradiated. Pressing The Button immediately awards 2 VP but all other players refuse to trade with you for 2 full turns. You cannot use ports during this embargo period." },
];

const body2 = document.getElementById('rules-body');
SECTIONS.forEach(s => {
  const art = el('article',{class:'rules-section',id:`s${s.id}`});
  art.appendChild(el('div',{class:'rules-section__num'},`SECTION ${s.id.padStart(2,'0')}`));
  art.appendChild(el('h2',{class:'rules-section__title'},s.title));
  art.appendChild(el('p',{class:'rules-section__body'},s.body));
  body2.appendChild(art);
});

const RELATED = [
  { category:'Rebalance', baseGame:'Catan', title:'Flooded Catan', body:"Rising sea levels slowly swallow the board. Coastal hexes sink one per round.", stats:'3–4 players · 75 min · 10+', href:'../flooded-catan/' },
  { category:'Total conversion', baseGame:'Catan', title:'The Diamond Mine', body:"Replace hexes with mine shafts. Push-your-luck digging replaces dice rolls.", stats:'3–4 players · 45 min · 12+', href:'../the-diamond-mine/' },
  { category:'Rebalance', baseGame:'Twilight Imperium 4e', title:'Hyper Imperium', body:"Hyper Movement, Hyper Trades, Hyper Agendas. A faster TI4 ruleset.", stats:'3–6 players · 4–6 hr · 14+', href:'../hyper-imperium/' },
];
const rg = document.getElementById('related-grid');
RELATED.forEach(m => rg.appendChild(modCard(m)));
</script>
</body>
</html>
