<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>The Diamond Mine — Moddable.Games</title>
<link rel="stylesheet" href="../../css/_mg.css">
<style>
.rules-sidebar { position: sticky; top: 96px; align-self: start; }
.rules-layout { display: grid; grid-template-columns: 240px 1fr; gap: 64px; }
</style>
</head>
<body class="mg-section--dark">
<div id="nav-root"></div>

<section class="mod-hero">
  <div class="mod-hero__glow mod-hero__glow--red"></div>
  <div class="mod-hero__inner hero-anim">
    <a href="../../mods/" class="mod-hero__back">&larr; All mods</a>
    <div class="mod-hero__tags">
      <span class="mod-hero__cat mod-hero__cat--red">Total conversion</span>
      <span class="mod-hero__base">base: Catan</span>
      <span class="mod-hero__version">v1.0.0</span>
    </div>
    <h1 class="mod-hero__title mod-hero__title--red">The Diamond <em>Mine</em>.</h1>
    <p class="mod-hero__lede">A single-hex unofficial expansion: swap one pasture for the diamond mine. Diamonds substitute for ore in development card purchases. Self-contained rules, free to print.</p>
    <div class="mod-hero__btns" id="header-btns"></div>
    <div class="stats-row" id="stats-row"></div>
  </div>
</section>

<section class="mg-section mg-section--light">
  <div class="mg-container rules-layout">
    <aside class="rules-sidebar">
      <div class="mg-eyebrow mg-eyebrow--red">THE RULES</div>
      <ol id="toc" class="toc-list"></ol>
    </aside>
    <div id="rules-body"></div>
  </div>
</section>

<section class="mg-section mg-section--light mg-section--flush-top">
  <div class="mg-container">
    <h2 class="mg-heading-xl">What you'll need.</h2>
    <div id="components-grid" class="mg-grid-3"></div>
  </div>
</section>

<section class="mg-section mg-section--white mg-section--border-top">
  <div class="mg-container">
    <h2 class="related-heading">More from the library.</h2>
    <div id="related-grid" class="mg-grid-3" data-stagger></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../../js/_mg.js"></script>
<script>
const { T, el, linkBtn, navbar, footer, modCard } = MG;
document.getElementById('nav-root').appendChild(navbar('Mods'));
document.getElementById('footer-root').appendChild(footer());

const hb = document.getElementById('header-btns');
hb.appendChild(linkBtn('Download PDF', '#', 'primary'));
hb.appendChild(linkBtn('View source', '#', 'outline-dark'));

const STATS = [['Players','3–4'],['Time','60 min'],['Age','10+'],['Source','scribd / meepleeater'],['License','Fan-made / free to print']];
const sr = document.getElementById('stats-row');
STATS.forEach(([k,v],i) => {
  if (i>0) sr.appendChild(el('span',{class:'stats-row__divider'}));
  const d = el('div',{class:'stats-row__item'});
  d.appendChild(el('span',{class:'stats-row__label'},k));
  d.appendChild(el('span',{class:'stats-row__value'},v));
  sr.appendChild(d);
});

const SECTIONS = [
  { id:'1', title:'Setup', body:"Replace one pasture hex with the diamond mine hex (any number you choose). The diamond mine produces diamonds instead of wool when its number is rolled." },
  { id:'2', title:'Diamond production', body:"When the diamond mine's number is rolled, adjacent settlements receive 1 diamond token. Cities receive 2 diamond tokens, as with any other resource." },
  { id:'3', title:'Diamond usage', body:"Diamonds substitute for ore when buying development cards (1 diamond = 1 ore). They cannot be used for any other purchase — settlements, cities, or roads still require standard resources." },
  { id:'4', title:'Trading', body:"Diamonds cannot be traded with other players or via port. They are personal resources only. This keeps the diamond mine from becoming an overpowered trade engine." },
  { id:'5', title:'Robber interaction', body:"If the robber is placed on the diamond mine, no diamonds are produced AND the robber steals 1 diamond (if the target has any). If the target has no diamonds, the robber steals a random resource as normal." },
];

const toc = document.getElementById('toc');
const body2 = document.getElementById('rules-body');
SECTIONS.forEach(s => {
  const li = el('li');
  const a = el('a',{href:`#s${s.id}`,class:'toc-list__link'});
  a.appendChild(el('span',{class:'toc-list__num'},s.id.padStart(2,'0')));
  a.appendChild(document.createTextNode(s.title));
  li.appendChild(a); toc.appendChild(li);

  const art = el('article',{class:'rules-section',id:`s${s.id}`});
  art.appendChild(el('div',{class:'rules-section__num'},`SECTION ${s.id.padStart(2,'0')}`));
  art.appendChild(el('h2',{class:'rules-section__title'},s.title));
  art.appendChild(el('p',{class:'rules-section__body'},s.body));
  body2.appendChild(art);
});

const COMPONENTS = [
  { kind:'Required', list:['Catan base game (any edition)','All standard hex tiles and number tokens','Resource cards and building pieces'] },
  { kind:'Printable', list:['Diamond mine hex tile (PDF, included)','Diamond resource tokens (cut-out sheet)','Quick-reference rules card'] },
  { kind:'House', list:['Small gems or glass beads as diamond tokens','Number token for the mine hex (your choice)','Pencil and paper for diamond tracking (optional)'] },
];
const cg = document.getElementById('components-grid');
COMPONENTS.forEach(({kind,list}) => {
  const c = el('div',{class:'mg-card'});
  c.appendChild(el('div',{class:'mg-card__eyebrow mg-eyebrow--red'},kind.toUpperCase()));
  const ul = el('ul',{class:'component-list'});
  list.forEach(x => {
    const li = el('li',{class:'component-list__item'});
    li.appendChild(el('span',{class:'component-list__bullet'}));
    li.appendChild(document.createTextNode(x));
    ul.appendChild(li);
  });
  c.appendChild(ul); cg.appendChild(c);
});

const RELATED = [
  { category:'Total conversion', baseGame:'Catan', title:'Nuke Catan', body:"Post-apocalyptic overhaul. Sheep are scarce, brick is currency.", stats:'3–5 players · 60 min · 12+', href:'../nuke-catan/' },
  { category:'Rebalance', baseGame:'Catan', title:'Flooded Catan', body:"Rising sea levels slowly swallow the board. Coastal hexes sink one per round.", stats:'3–4 players · 75 min · 10+', href:'../flooded-catan/' },
  { category:'Rebalance', baseGame:'Monopoly', title:'Econopoly', body:"Monopoly with a working economy. Dynamic pricing and tax bands.", stats:'2–6 players · 60 min · 10+', href:'../econopoly/' },
];
const rg = document.getElementById('related-grid');
RELATED.forEach(m => rg.appendChild(modCard(m)));
</script>
</body>
</html>
