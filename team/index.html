<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mg-base" content="/MODDABLE/moddable-website">
<title>Team — Moddable.Games</title>
<link rel="stylesheet" href="../css/_mg.css">
<style>
body { background: #f5f4ef; }
.team-section { padding: 72px 32px 96px; }
.team-card { background: #fff; border: 1px solid var(--mg-hairline-light); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
.team-card__header { display: flex; align-items: center; gap: 14px; }
.team-card__avatar { width: 56px; height: 56px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-family: var(--mg-font-pixel); font-size: 16px; color: #fff; flex: none; }
.team-card__name { font-family: var(--mg-font-display); font-weight: 600; font-size: 20px; letter-spacing: -0.25px; color: var(--mg-ink); }
.team-card__role { font-family: var(--mg-font-mono); font-size: 12px; color: var(--mg-stone); margin-top: 2px; }
.team-card__bio { font-family: var(--mg-font-body); font-size: 14px; line-height: 1.6; color: #3a3d44; margin: 0; }
.team-card__handle { font-family: var(--mg-font-mono); font-size: 12px; margin-top: auto; }
</style>
</head>
<body>
<div id="nav-root"></div>
<div id="page-hero"></div>

<section class="team-section">
  <div class="mg-container">
    <div id="team-grid" class="mg-grid-auto"></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../js/_mg.js"></script>
<script>
const { el, navbar, footer, pageHero } = MG;
document.getElementById('nav-root').appendChild(navbar('About'));
document.getElementById('footer-root').appendChild(footer());
document.getElementById('page-hero').appendChild(pageHero({
  eyebrow:'▲ THE TEAM',
  title:'Six humans. Zero AI.',
  lede:'The people who write the rules, draw the tiles, and lose every game of Nuke Catan.',
}));

const TEAM = [
  { handle:'@ascelot',   name:'Riley', role:'Founder · rules',   bio:"Designs the mods, runs the playtests, refuses to use Comic Sans on the PDFs.", color:'#d11a1a' },
  { handle:'@cobalt',    name:'Sam',   role:'Original games',    bio:"Lead on Endless Skies + Mongo. Holds the only spreadsheet that explains TI4 in one row.", color:'#0c4f8d' },
  { handle:'@hexbear',   name:'Joel',  role:'Art + components',  bio:"Hexagonal everything. Drew 61 tiles for Talisman: Hexed in three weeks.", color:'#3a9928' },
  { handle:'@tessellate',name:'Tess',  role:'Community',         bio:"Runs the Discord. Runs the mod jams. Has read every house-rule thread on BoardGameGeek.", color:'#e89a1a' },
  { handle:'@nukular',   name:'Kit',   role:'Tools + dev',       bio:"Built the dice roller. Maintains the modding hooks repo. Loses every game of Nuke Catan.", color:'#5d2a8a' },
  { handle:'@longest',   name:'Ben',   role:'Words',             bio:"Writes the news posts you actually read. Strictly written by humans, including this bio.", color:'#936d62' },
];

const grid = document.getElementById('team-grid');
TEAM.forEach(m => {
  const card = el('article',{class:'team-card'});
  const hrow = el('div',{class:'team-card__header'});
  const avatar = el('div',{class:'team-card__avatar'});
  avatar.style.background = `linear-gradient(135deg,${m.color},${m.color}88)`;
  avatar.textContent = m.name[0];
  hrow.appendChild(avatar);
  const info = el('div');
  info.appendChild(el('div',{class:'team-card__name'},m.name));
  info.appendChild(el('div',{class:'team-card__role'},m.role));
  hrow.appendChild(info);
  card.appendChild(hrow);
  card.appendChild(el('p',{class:'team-card__bio'},m.bio));
  const handle = el('div',{class:'team-card__handle'},m.handle);
  handle.style.color = m.color;
  card.appendChild(handle);
  grid.appendChild(card);
});
</script>
</body>
</html>
