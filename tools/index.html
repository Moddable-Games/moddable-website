<body>
<div id="nav-root"></div>

<section class="tools-hero">
  <div class="tools-hero__bloom"></div>
  <div class="tools-hero__inner">
    <div class="tools-hero__text">
      <div class="mg-eyebrow mg-eyebrow--glow">THE WORKBENCH</div>
      <h1 class="tools-hero__title">The toys we built<br>for the table.</h1>
      <p class="tools-hero__lede">A dice roller for when you've lost yours under the couch. A name generator for hex-tile heroes. A scoreboard for everything else.</p>
    </div>
    <div class="tools-hero__dice" id="hero-dice">
      <div class="dice3d">
        <div class="dice3d__face dice3d__face--front"><span class="pip"></span></div>
        <div class="dice3d__face dice3d__face--back"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
        <div class="dice3d__face dice3d__face--top"><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
        <div class="dice3d__face dice3d__face--bottom"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
        <div class="dice3d__face dice3d__face--right"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
        <div class="dice3d__face dice3d__face--left"><span class="pip"></span><span class="pip"></span></div>
      </div>
    </div>
  </div>
</section>

<nav class="tools-jumpnav">
  <div class="tools-jumpnav__inner">
    <a href="#section-rules" class="tools-jumpnav__link tools-jumpnav__link--red">Rules Lookup</a>

    <a href="#section-planning" class="tools-jumpnav__link tools-jumpnav__link--green">Planning</a>
    <a href="#section-per-game" class="tools-jumpnav__link">Per-Game</a>
  </div>
</nav>

<section class="tools-body">
  <div class="tools-body__inner">
    <div id="tools-grid"></div>
    <div id="section-per-game" class="tools-section">
      <h2 class="tools-section__heading">Per-game tools</h2>
      <p class="tools-section__sub">Built for specific games. Pick yours.</p>
      <div class="mg-grid-3" id="mod-tools-grid"></div>
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../js/mg-loader.js?v=1.0.56"></script>
<script src="../js/mg-tools-page.js?v=1.0.56"></script>
